[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "predikit"
version = "0.4.4"
description = "Wrap any trained sklearn/XGBoost model as an LLM-callable tool — auto-generated JSON schemas, Pydantic I/O, OpenAI & LangChain ready, zero boilerplate."
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.10"
authors = [
    {name = "Tejas Tumakuru Ashok", email = "tejasta@gmail.com"},
]
keywords = [
    "llm", "agents", "sklearn", "scikit-learn", "xgboost",
    "function-calling", "tool-use", "openai", "langchain",
    "mlops", "machine-learning", "ai-agents", "pydantic",
    "ml-tools", "model-serving",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]
dependencies = [
    "pydantic>=2.0",
    "scikit-learn>=1.2",
    "numpy>=1.24",
]

[project.optional-dependencies]
langchain = ["langchain-core>=0.1"]
xgboost = ["xgboost>=1.7"]
mlflow = ["mlflow>=2.0"]
snowflake = ["snowflake-ml-python>=1.0"]
cli = ["click>=8.0", "joblib>=1.2"]
dev = [
    "pytest>=7.0",
    "pytest-cov>=4.0",
    "xgboost>=1.7",
    "langchain-core>=0.1",
    "pandas>=1.5",
    "mlflow>=2.0",
    "click>=8.0",
    "joblib>=1.2",
    "ruff>=0.4.0",
    "mypy>=1.10",
    "pre-commit>=3.0",
]

[project.scripts]
predikit = "predikit.cli:cli"

[project.urls]
Homepage = "https://github.com/Tejas-TA/predikit"
Repository = "https://github.com/Tejas-TA/predikit"
Documentation = "https://github.com/Tejas-TA/predikit#readme"
"Bug Tracker" = "https://github.com/Tejas-TA/predikit/issues"
Changelog = "https://github.com/Tejas-TA/predikit/releases"

[tool.hatch.build.targets.wheel]
packages = ["src/predikit"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = ["E501"]

[tool.ruff.lint.isort]
known-first-party = ["predikit"]

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true
